<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Szoftverleltár - OOJS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; }
        .gep-kartya {
            border: 1px solid #444;
            background-color: #fff;
            padding: 15px;
            width: 200px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .ip-cimke {
            color: #d9534f;
            font-family: monospace;
            font-size: 1.1em;
            margin-top: 5px;
        }
        .controls { 
            background: #fff; 
            padding: 20px; 
            border-bottom: 2px solid #ddd; 
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h3>Gép kezelő panel</h3>
        X: <input type="number" id="posX" value="50">
        Y: <input type="number" id="posY" value="250">
        <button onclick="updatePosition()">Pozicionálás</button>
        <button onclick="toggleView('visible')">Megjelenítés</button>
        <button onclick="toggleView('hidden')">Elrejtés</button>
    </div>

    <script>
        class Gep {
            constructor(nev, tipus, x, y) {
                this.nev = nev;
                this.tipus = tipus;
                
                this.container = document.createElement("div");
                this.container.className = "gep-kartya";
                this.container.innerHTML = `<strong>${nev}</strong><br><small>${tipus}</small>`;
                
                this.container.style.position = "absolute";
                this.container.style.left = x + "px";
                this.container.style.top = y + "px";
                
                document.body.appendChild(this.container);
            }

            show() {
                this.container.style.visibility = "visible";
            }

            hide() {
                this.container.style.visibility = "hidden";
            }

            putAt(x, y) {
                this.container.style.left = x + "px";
                this.container.style.top = y + "px";
            }
        }

        class ReszletesGep extends Gep {
            constructor(nev, tipus, x, y, ip) {
                super(nev, tipus, x, y);
                this.ip = ip;

                this.label = document.createElement("div");
                this.label.className = "ip-cimke";
                this.label.innerHTML = "IP: " + ip;
                this.label.style.position = "absolute";
                this.label.style.left = x + "px";
                this.label.style.top = (parseInt(y) + 85) + "px";
                
                document.body.appendChild(this.label);
            }

            show() {
                super.show();
                this.label.style.visibility = "visible";
            }

            hide() {
                super.hide();
                this.label.style.visibility = "hidden";
            }

            putAt(x, y) {
                super.putAt(x, y);
                this.label.style.left = x + "px";
                this.label.style.top = (parseInt(y) + 85) + "px";
            }
        }

        const pcInstance = new ReszletesGep("PC-SERVER-01", "Munkaállomás", 50, 250, "192.168.10.115");

        function updatePosition() {
            const x = document.getElementById("posX").value;
            const y = document.getElementById("posY").value;
            pcInstance.putAt(x, y);
        }

        function toggleView(state) {
            if (state === 'visible') {
                pcInstance.show();
            } else {
                pcInstance.hide();
            }
        }
    </script>
</body>
</html>
