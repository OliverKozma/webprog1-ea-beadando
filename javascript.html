    function displayData() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        softwareList.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td><strong>${index + 1}</strong></td>
                    <td>${item.name}</td>
                    <td>${item.category}</td>
                    <td>
                        <button class="action-btn-edit" onclick="editData(${index})">Szerkesztés</button>
                        <button class="action-btn-delete" onclick="deleteData(${index})">Törlés</button>
                    </td>
                </tr>`;
        });
    }

    
    function saveData() {
        const nameVal = document.getElementById('input-name').value;
        const catVal = document.getElementById('input-category').value;
        const editIdx = parseInt(document.getElementById('edit-index').value);

        if (nameVal.trim() === "" || catVal.trim() === "") {
            alert("Kérlek töltsd ki mindkét mezőt!");
            return;
        }

        if (editIdx === -1) {
            softwareList.push({ name: nameVal, category: catVal });
        } else {
            softwareList[editIdx] = { name: nameVal, category: catVal };
        }

        resetForm();
        displayData();
    }

    function deleteData(index) {
        if (confirm(`Biztosan törölni szeretnéd a(z) ${softwareList[index].name} szoftvert?`)) {
            softwareList.splice(index, 1);
            displayData();
        }
    }

    // Törlés (DELETE)
    function deleteData(index) {
        if (confirm("Biztosan törlöd?")) {
            softwareList.splice(index, 1);
            displayData();
        }
    }

    
    function editData(index) {
        
        document.getElementById('input-name').value = softwareList[index].name;
        document.getElementById('input-category').value = softwareList[index].category;
        document.getElementById('edit-index').value = index;
        
        
        document.getElementById('form-title').innerText = "Szoftver módosítása";
        document.getElementById('save-btn').innerText = "Módosítás mentése";
        document.getElementById('save-btn').className = "btn-edit-mode";
        document.getElementById('cancel-btn').style.display = "inline-block";

        
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });

        
        document.getElementById('input-name').focus();
    }

    
    function resetForm() {
        document.getElementById('input-name').value = '';
        document.getElementById('input-category').value = '';
        document.getElementById('edit-index').value = '-1';
        document.getElementById('form-title').innerText = "Új szoftver hozzáadása";
        document.getElementById('save-btn').innerText = "Hozzáadás";
        document.getElementById('save-btn').classList.remove('btn-edit-mode');
        document.getElementById('cancel-btn').style.display = "none";
    }

    
    displayData();
</script>
